<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <nav class="bg-blue-600 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between">
      <h1 class="text-2xl font-bold">Express App</h1>

      <div class="space-x-6">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </nav>

  <div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">

    <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">
      Contact Form
    </h1>

    <form action="/formSubmit" method="POST">

      <input type="text" name="username" placeholder="Enter Name" class="w-full border p-3 rounded-lg mb-4" required>

      <input type="email" name="email" placeholder="Enter Email" class="w-full border p-3 rounded-lg mb-4" required>

      <input type="password" name="password" placeholder="Enter Password" class="w-full border p-3 rounded-lg mb-4"
        required>

      <button class="w-full bg-blue-600 text-whsite p-3 rounded-lg hover:bg-blue-700">
        Submit
      </button>

    </form>

  </div>

</body>

</html>
